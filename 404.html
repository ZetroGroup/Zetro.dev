<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>404 - We didn't find that!</title>
    <link rel="icon" href="/a/logo.png">
  </head>
  <style>
    body {
      background-color: rgba(0,0,0);
      color: white;
      font-family: Arial;
    }

    .discord {
      color: #5865f2;
      cursor: default;
    }

    p {
      cursor: default;
    }

    h1 {
      cursor: default;
      font-size: 65px;
    }

    .back-btn {
      display: inline-block;
      padding: 10px 25px;
      background: rgba(25, 25, 25, 0.1);
      color: white;
      border: 1px solid rgba(35, 35, 35, 0.3);
      border-radius: 50px;
      box-shadow: 0 1px 0 rgba(10, 10, 10, 0.06) inset;
      font-weight: 500;
      transition: all 0.3s ease;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-btn:hover {
      background: rgba(45, 45, 45, 0.4);
      border-color: rgba(66, 66, 66, 0.5);
      color: white;
      transform: translateY(-2px);
      cursor: pointer;
    }
  </style>
  <body>
      <br>
      <center><h1>404</h1></center>
      <br>
      <center><button class="back-btn">Go back to Home?</button></center>
      <br>
      <center><p class="discord">Report any issues to our discord</p></center>
      <center><a href="https://discord.gg/rf2CJwpcRH"><img src="https://zetro.dev/a/discord_icon.png" height="40px" width="50px"></a></center>
  </body>
</html>
